<!DOCTYPE html>
<html lang="da" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mine websites — Reachmore</title>
<link rel="icon" href="assets/img/reachmore-logo.png">
<link rel="stylesheet" href="assets/css/reachmore.css?v=11">
<style>
.db-nav { display: flex; align-items: center; justify-content: space-between; height: 66px; border-bottom: 1px solid var(--line); position: sticky; top: 0; background: color-mix(in srgb, var(--bg) 80%, transparent); backdrop-filter: blur(12px); z-index: 50; }
.db-nav .logo { height: 28px; }
.db-wrap { max-width: 1100px; margin: 0 auto; padding: 40px 24px 90px; }
.db-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; margin-bottom: 28px; flex-wrap: wrap; }
.db-head h1 { font-size: 32px; font-weight: 900; letter-spacing: -.02em; }
.db-head p { color: var(--text-dim); margin-top: 4px; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }
.card { background: var(--bg-1); border: 1px solid var(--line); border-radius: 16px; overflow: hidden; transition: transform .18s, border-color .18s, box-shadow .18s; }
.card:hover { transform: translateY(-4px); border-color: var(--line-2); box-shadow: var(--shadow-sm); }
.card .thumb { height: 150px; position: relative; cursor: pointer; display: flex; align-items: center; justify-content: center; overflow: hidden; }
.card .thumb .mini { position: absolute; inset: 18px; border-radius: 9px; background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.25); display: flex; flex-direction: column; gap: 6px; padding: 14px; }
.card .thumb .mini i { height: 8px; border-radius: 4px; background: rgba(255,255,255,.5); display: block; }
.card .thumb .st { position: absolute; top: 10px; right: 10px; font-size: 11px; font-weight: 800; padding: 3px 9px; border-radius: 99px; backdrop-filter: blur(6px); }
.card .thumb .st.draft { background: rgba(0,0,0,.45); color: #fff; }
.card .thumb .st.published { background: rgba(16,185,129,.9); color: #fff; }
.card .meta { padding: 14px 16px; }
.card .meta b { font-size: 15.5px; display: block; }
.card .meta span { font-size: 12.5px; color: var(--text-faint); }
.card .acts { display: flex; gap: 6px; padding: 0 16px 14px; }
.card .acts .open { flex: 1; justify-content: center; }
.card .acts .ib { width: 36px; height: 36px; border-radius: 9px; border: 1px solid var(--line); background: var(--bg-2); color: var(--text-dim); display: flex; align-items: center; justify-content: center; }
.card .acts .ib:hover { color: var(--text); border-color: var(--line-2); } .card .acts .ib.danger:hover { color: #ff6b6b; border-color: #ff6b6b; }
.card .acts .ib svg { width: 16px; height: 16px; }
.new-card { border: 1.5px dashed var(--line-2); background: transparent; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 240px; cursor: pointer; color: var(--text-dim); gap: 10px; border-radius: 16px; transition: all .18s; }
.new-card:hover { border-color: var(--accent); color: var(--text); background: var(--bg-1); transform: translateY(-4px); }
.new-card .plus { width: 52px; height: 52px; border-radius: 14px; background: var(--rm-grad); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 28px; }
.locked { text-align: center; padding: 90px 24px; }
.db-empty { text-align: center; color: var(--text-dim); padding: 30px; grid-column: 1/-1; }
</style>
</head>
<body>
<div class="bg-orbs"><div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div></div>
<header class="db-nav"><div class="container" style="display:flex;align-items:center;justify-content:space-between;width:100%">
  <a href="index.html"><img class="logo" src="assets/img/reachmore-logo.png" alt="Reachmore"></a>
  <div id="acct"></div>
</div></header>
<main id="db"></main>

<script src="assets/js/store.js?v=11"></script>
<script src="assets/js/tokens.js?v=11"></script>
<script src="assets/js/auth.js?v=11"></script>
<script src="assets/js/bot.js?v=11"></script>
<script>
(function () {
  const RM = window.RM, $ = s => document.querySelector(s);
  const date = ts => new Date(ts).toLocaleDateString('da-DK', { day: '2-digit', month: 'short', year: 'numeric' });
  const grad = p => `linear-gradient(135deg, ${(p && p.p2) || '#f97316'}, ${(p && p.p) || '#8b5cf6'})`;
  const esc = s => String(s == null ? '' : s).replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
  const I = {
    edit: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 013 3L7 19l-4 1 1-4 12.5-12.5z"/></svg>',
    dup: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 012-2h10"/></svg>',
    del: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7h16M9 7V5a2 2 0 012-2h2a2 2 0 012 2v2M6 7l1 13a2 2 0 002 2h6a2 2 0 002-2l1-13"/></svg>'
  };
  function render() {
    const acct = $('#acct'); if (acct && window.RMAuth) window.RMAuth.mountAccount(acct);
    const u = RM.currentUser(); const box = $('#db');
    if (!u) {
      box.innerHTML = `<div class="locked"><h1 style="font-size:30px;font-weight:900">Log ind for at se dine websites</h1><p class="muted" style="margin:12px 0 22px">Opret en gratis konto, så gemmes alle dine sider ét sted — ligesom et rigtigt dashboard.</p><button class="btn btn-primary btn-lg" id="lg">Log ind / opret konto</button></div>`;
      $('#lg').onclick = () => RMAuth.open('signup');
      return;
    }
    const projects = RM.listProjects();
    box.innerHTML = `<div class="db-wrap">
      <div class="db-head"><div><h1>Mine websites</h1><p>${projects.length ? projects.length + ' projekt' + (projects.length === 1 ? '' : 'er') + ' · byg så mange du vil' : 'Du har ingen websites endnu — byg dit første!'}</p></div>
        <a class="btn btn-primary" href="studio.html?new=1">＋ Nyt website</a></div>
      <div class="grid">
        <div class="new-card" id="newCard"><div class="plus">＋</div><b>Byg nyt website</b><span class="muted" style="font-size:13px">Med AI på sekunder</span></div>
        ${projects.map(p => `<div class="card" data-id="${p.id}">
          <div class="thumb" data-open style="background:${grad(p.theme)}">
            <span class="st ${p.status}">${p.status === 'published' ? 'Udgivet' : 'Kladde'}</span>
            <div class="mini"><i style="width:60%"></i><i style="width:90%"></i><i style="width:75%"></i><i style="width:50%"></i></div>
          </div>
          <div class="meta"><b>${esc(p.name)}</b><span>${(p.blocks || []).length} sektioner · ændret ${date(p.updatedAt)}</span></div>
          <div class="acts">
            <button class="btn btn-ghost btn-sm open" data-open>Åbn i Studio</button>
            <button class="ib" data-rename title="Omdøb">${I.edit}</button>
            <button class="ib" data-dup title="Dupliker">${I.dup}</button>
            <button class="ib danger" data-del title="Slet">${I.del}</button>
          </div>
        </div>`).join('')}
      </div>
    </div>`;
    $('#newCard').onclick = () => location.href = 'studio.html?new=1';
    box.querySelectorAll('.card[data-id]').forEach(card => {
      const id = card.dataset.id;
      card.querySelectorAll('[data-open]').forEach(el => el.onclick = () => location.href = 'studio.html?id=' + id);
      card.querySelector('[data-rename]').onclick = () => { const n = prompt('Nyt navn til projektet:', RM.getProject(id).name); if (n && n.trim()) RM.renameProject(id, n.trim()); };
      card.querySelector('[data-dup]').onclick = () => RM.duplicateProject(id);
      card.querySelector('[data-del]').onclick = () => { if (confirm('Slet "' + RM.getProject(id).name + '"? Dette kan ikke fortrydes.')) RM.deleteProject(id); };
    });
  }
  RM.on(render); render();
})();
</script>
</body>
</html>

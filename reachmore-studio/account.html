<!DOCTYPE html>
<html lang="da" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reachmore — Min konto</title>
<link rel="icon" href="assets/img/reachmore-logo.png">
<link rel="stylesheet" href="assets/css/reachmore.css?v=11">
<style>
.acc-nav { display: flex; align-items: center; justify-content: space-between; height: 68px; border-bottom: 1px solid var(--line); }
.acc-nav .logo { height: 28px; }
.acc-wrap { max-width: 860px; margin: 0 auto; padding: 38px 24px 80px; }
.acc-wrap h1 { font-size: 30px; font-weight: 900; margin-bottom: 4px; }
.acc-wrap .lead { color: var(--text-dim); margin-bottom: 28px; }
.acc-card { background: var(--bg-1); border: 1px solid var(--line); border-radius: 18px; padding: 26px; margin-bottom: 20px; }
.acc-card h3 { font-size: 17px; margin-bottom: 16px; }
.prof { display: flex; align-items: center; gap: 16px; }
.prof .av { width: 64px; height: 64px; border-radius: 50%; background: var(--rm-grad); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 24px; }
.prof .meta b { font-size: 18px; } .prof .meta span { color: var(--text-faint); font-size: 14px; }
.prof .pill { display: inline-block; margin-top: 6px; font-size: 11px; font-weight: 800; color: #fff; background: var(--rm-grad); padding: 3px 10px; border-radius: 99px; }
.prof .pill.free { background: var(--bg-3); color: var(--text-dim); }
.acc-stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 14px; margin-top: 20px; }
@media(max-width:600px){ .acc-stats { grid-template-columns: 1fr; } }
.acc-stat { background: var(--bg-2); border: 1px solid var(--line); border-radius: 12px; padding: 16px; }
.acc-stat .v { font-family: var(--display); font-size: 26px; font-weight: 900; }
.acc-stat .k { font-size: 13px; color: var(--text-faint); }
.dom-row { display: flex; align-items: center; gap: 12px; padding: 13px 0; border-bottom: 1px solid var(--line); }
.dom-row:last-child { border-bottom: none; }
.dom-row .h { font-family: var(--display); font-weight: 700; flex: 1; }
.dom-row .badge { font-size: 11px; font-weight: 800; padding: 3px 9px; border-radius: 6px; background: var(--bg-3); color: var(--text-dim); }
.dom-row .st { font-size: 12px; font-weight: 700; padding: 3px 10px; border-radius: 99px; }
.dom-row .st.active { background: rgba(16,185,129,.14); color: #34d399; } .dom-row .st.pending { background: rgba(245,158,11,.14); color: #fbbf24; }
.dom-add { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 16px; align-items: end; }
.dom-add .fg { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 180px; }
.dom-add label { font-size: 12.5px; color: var(--text-dim); font-weight: 600; }
.dom-add input { background: var(--bg-2); border: 1px solid var(--line); border-radius: 10px; padding: 10px 13px; color: var(--text); outline: none; }
.dom-add input:focus { border-color: var(--accent); box-shadow: var(--ring); }
.locked { text-align: center; padding: 90px 24px; }
</style>
</head>
<body>
<div class="bg-orbs"><div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div></div>
<header class="container acc-nav">
  <a href="index.html"><img class="logo" src="assets/img/reachmore-logo.png" alt="Reachmore"></a>
  <div id="acct"></div>
</header>
<div id="acc"></div>
<script src="assets/js/store.js?v=11"></script>
<script src="assets/js/tokens.js?v=11"></script>
<script src="assets/js/auth.js?v=11"></script>
<script>
(function () {
  const RM = window.RM, $ = s => document.querySelector(s);
  const ini = u => (u.name || u.email || '?').split(/[ @.]/).filter(Boolean).map(w => w[0]).join('').slice(0, 2).toUpperCase();
  const tk = n => window.RMTokens.fmt(n);
  const date = ts => new Date(ts).toLocaleDateString('da-DK', { day: '2-digit', month: 'short', year: 'numeric' });
  function render() {
    const acct = $('#acct'); if (acct && window.RMAuth) window.RMAuth.mountAccount(acct);
    const u = RM.currentUser(); const box = $('#acc');
    if (!u) { box.innerHTML = `<div class="locked"><h1>Log ind på din konto</h1><p class="muted" style="margin:10px 0 22px">Du skal være logget ind for at se din konto og dine domæner.</p><button class="btn btn-primary" id="lg">Log ind</button></div>`; $('#lg').onclick = () => RMAuth.open('login'); return; }
    const pl = RM.plan(); const plName = pl ? RM.PLANS[pl].name : 'Gratis';
    const doms = RM.userDomains(u.id);
    box.innerHTML = `<div class="acc-wrap">
      <h1>Min konto</h1><p class="lead">Administrér dit abonnement og dine domæner.</p>
      <div class="acc-card">
        <div class="prof"><div class="av">${ini(u)}</div><div class="meta"><b>${u.name || ''}</b><br><span>${u.email}</span><br><span class="pill ${pl ? '' : 'free'}">${plName}-plan</span></div></div>
        <div class="acc-stats">
          <div class="acc-stat"><div class="v">${tk(RM.tokens())}</div><div class="k">AI-tokens tilbage</div></div>
          <div class="acc-stat"><div class="v">${doms.length}</div><div class="k">Domæner</div></div>
          <div class="acc-stat"><div class="v">${date(u.createdAt)}</div><div class="k">Medlem siden</div></div>
        </div>
        <div style="margin-top:18px;display:flex;gap:10px;flex-wrap:wrap">
          <button class="btn btn-primary" id="up">${pl ? 'Skift / opgradér plan' : 'Opgradér for at udgive'}</button>
          <a class="btn btn-ghost" href="studio.html">Åbn Studio</a>
        </div>
      </div>
      <div class="acc-card">
        <h3>Mine domæner</h3>
        ${doms.length ? doms.map(d => `<div class="dom-row"><span class="h">${d.host}</span><span class="badge">${d.kind === 'subdomain' ? '.reachmore.dk' : 'eget'}</span><span class="st ${d.status === 'active' ? 'active' : 'pending'}">${d.status === 'active' ? 'Aktiv' : 'Afventer DNS'}</span></div>`).join('') : '<p class="muted">Du har ingen domæner endnu. Opret et .reachmore.dk-domæne herunder.</p>'}
        ${pl ? `<div class="dom-add">
          <div class="fg"><label>Opret .reachmore.dk subdomæne</label><input id="sub" placeholder="fx ${RM.slug(u.name || 'mitfirma')}"></div>
          <button class="btn btn-primary" id="mkSub">Opret</button>
          <div class="fg"><label>Tilknyt eget domæne</label><input id="cus" placeholder="mitfirma.dk"></div>
          <button class="btn btn-ghost" id="mkCus">Tilknyt</button>
        </div>` : '<p class="muted" style="margin-top:14px">🔒 Opgradér til en betalt plan for at oprette og tilknytte domæner.</p>'}
      </div>
    </div>`;
    $('#up').onclick = () => RMTokens.openUpgrade('publish');
    if ($('#mkSub')) $('#mkSub').onclick = () => { const v = $('#sub').value.trim(); if (v) RM.addSubdomain(u.id, v); };
    if ($('#mkCus')) $('#mkCus').onclick = () => { const v = $('#cus').value.trim(); if (!v) return; const r = RM.addCustomDomain(u.id, v); if (r.error) alert(r.error); };
  }
  RM.on(render); render();
})();
</script>
</body>
</html>

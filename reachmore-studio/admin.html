<!DOCTYPE html>
<html lang="da" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reachmore — Admin</title>
<link rel="icon" href="assets/img/reachmore-logo.png">
<link rel="stylesheet" href="assets/css/reachmore.css?v=11">
<style>
html, body { height: 100%; }
.adm { display: grid; grid-template-columns: 250px 1fr; min-height: 100vh; }
@media(max-width:820px){ .adm { grid-template-columns: 64px 1fr; } }

/* sidebar */
.adm-side { background: var(--bg-1); border-right: 1px solid var(--line); display: flex; flex-direction: column; padding: 18px 14px; position: sticky; top: 0; height: 100vh; }
.adm-side .brand { display: flex; align-items: center; gap: 8px; padding: 6px 8px 18px; }
.adm-side .brand img { height: 26px; }
.adm-side .brand .tag { font-size: 10px; font-weight: 800; letter-spacing: .12em; color: #fff; background: var(--rm-grad); padding: 2px 7px; border-radius: 6px; }
.adm-nav { display: flex; flex-direction: column; gap: 3px; flex: 1; }
.adm-nav a { display: flex; align-items: center; gap: 11px; padding: 11px 12px; border-radius: 10px; color: var(--text-dim); font-weight: 600; font-size: 14.5px; cursor: pointer; }
.adm-nav a:hover { background: var(--bg-2); color: var(--text); }
.adm-nav a.on { background: var(--rm-grad-soft); color: var(--text); }
.adm-nav a svg { width: 18px; height: 18px; flex-shrink: 0; }
.adm-side .foot { border-top: 1px solid var(--line); padding-top: 12px; font-size: 13px; }
.adm-side .foot a { color: var(--text-dim); display: block; padding: 6px 8px; border-radius: 8px; }
.adm-side .foot a:hover { color: var(--text); background: var(--bg-2); }
@media(max-width:820px){ .adm-side .brand img, .adm-side .brand .tag, .adm-nav a span, .adm-side .foot { display: none; } .adm-nav a { justify-content: center; } }

/* main */
.adm-main { min-width: 0; }
.adm-top { display: flex; align-items: center; gap: 16px; padding: 18px 28px; border-bottom: 1px solid var(--line); position: sticky; top: 0; background: color-mix(in srgb, var(--bg) 80%, transparent); backdrop-filter: blur(10px); z-index: 20; }
.adm-top h1 { font-size: 22px; font-weight: 800; }
.adm-top .search { margin-left: auto; width: 240px; max-width: 40vw; background: var(--bg-2); border: 1px solid var(--line); border-radius: 10px; padding: 9px 13px; outline: none; color: var(--text); font-size: 14px; }
.adm-top .search:focus { border-color: var(--accent); box-shadow: var(--ring); }
.adm-content { padding: 28px; }

/* stat cards */
.stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 28px; }
.stat { background: var(--bg-1); border: 1px solid var(--line); border-radius: 16px; padding: 20px; }
.stat .k { font-size: 13px; color: var(--text-faint); font-weight: 600; display: flex; align-items: center; gap: 8px; }
.stat .k svg { width: 16px; height: 16px; color: var(--accent); }
.stat .v { font-family: var(--display); font-size: 34px; font-weight: 900; margin-top: 8px; }
.stat .sub { font-size: 12.5px; color: var(--text-faint); margin-top: 2px; }

.panel-card { background: var(--bg-1); border: 1px solid var(--line); border-radius: 16px; overflow: hidden; margin-bottom: 22px; }
.panel-card .ph { padding: 16px 20px; border-bottom: 1px solid var(--line); display: flex; align-items: center; justify-content: space-between; }
.panel-card .ph h3 { font-size: 16px; font-weight: 800; }

/* table */
.tbl { width: 100%; border-collapse: collapse; font-size: 14px; }
.tbl th { text-align: left; padding: 12px 16px; font-size: 12px; text-transform: uppercase; letter-spacing: .04em; color: var(--text-faint); border-bottom: 1px solid var(--line); white-space: nowrap; }
.tbl td { padding: 12px 16px; border-bottom: 1px solid var(--line); vertical-align: middle; }
.tbl tr:last-child td { border-bottom: none; }
.tbl tr:hover td { background: var(--bg-2); }
.u-cell { display: flex; align-items: center; gap: 11px; }
.u-cell .av { width: 36px; height: 36px; border-radius: 50%; background: var(--rm-grad); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 13px; flex-shrink: 0; }
.u-cell b { display: block; font-size: 14px; } .u-cell span { font-size: 12.5px; color: var(--text-faint); }
.pbadge { font-size: 12px; font-weight: 800; padding: 3px 10px; border-radius: 99px; color: #fff; }
.sbadge { font-size: 12px; font-weight: 700; padding: 3px 10px; border-radius: 99px; }
.sbadge.active { background: rgba(16,185,129,.14); color: #34d399; } .sbadge.suspended { background: rgba(239,68,68,.14); color: #f87171; }
.rbadge { font-size: 11px; font-weight: 800; padding: 2px 9px; border-radius: 6px; background: var(--bg-3); color: var(--text-dim); text-transform: uppercase; letter-spacing: .03em; }
.inline-sel { background: var(--bg-2); border: 1px solid var(--line); border-radius: 8px; padding: 6px 8px; color: var(--text); font-size: 13px; outline: none; }
.inline-sel:focus { border-color: var(--accent); }
.row-acts { display: flex; gap: 6px; flex-wrap: wrap; }
.mini { padding: 6px 10px; font-size: 12.5px; border-radius: 8px; border: 1px solid var(--line); background: var(--bg-2); color: var(--text-dim); font-weight: 600; }
.mini:hover { color: var(--text); border-color: var(--line-2); } .mini.danger:hover { color: #f87171; border-color: #f87171; }
.adm-empty { padding: 40px; text-align: center; color: var(--text-faint); }

.log-item { display: flex; gap: 12px; padding: 11px 16px; border-bottom: 1px solid var(--line); font-size: 13.5px; }
.log-item:last-child { border-bottom: none; }
.log-item .t { color: var(--text-faint); white-space: nowrap; font-size: 12.5px; min-width: 130px; }
.log-item .a { font-weight: 700; color: var(--accent); min-width: 110px; }
.add-form { display: flex; gap: 10px; flex-wrap: wrap; padding: 16px 20px; border-bottom: 1px solid var(--line); align-items: end; }
.add-form .fg { display: flex; flex-direction: column; gap: 5px; }
.add-form label { font-size: 12px; color: var(--text-dim); font-weight: 600; }
.add-form input, .add-form select { background: var(--bg-2); border: 1px solid var(--line); border-radius: 9px; padding: 9px 12px; color: var(--text); outline: none; font-size: 13.5px; }
.add-form input:focus, .add-form select:focus { border-color: var(--accent); }

.denied { min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 24px; }
.denied .box { max-width: 380px; }
.denied .lock { width: 70px; height: 70px; border-radius: 20px; background: var(--rm-grad); display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }
.denied .lock svg { width: 34px; height: 34px; color: #fff; }
.denied h1 { font-size: 26px; margin-bottom: 8px; } .denied p { color: var(--text-dim); margin-bottom: 20px; }
</style>
</head>
<body>
<div id="app"></div>
<script src="assets/js/store.js?v=11"></script>
<script src="assets/js/tokens.js?v=11"></script>
<script src="assets/js/auth.js?v=11"></script>
<script src="assets/js/admin.js?v=11"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="da" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reachmore Studio — Visuel AI Editor</title>
<link rel="icon" href="assets/img/reachmore-logo.png">
<link rel="stylesheet" href="assets/css/reachmore.css?v=11">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&family=Lora:wght@400;500;600;700&family=Montserrat:wght@400;600;800&family=Outfit:wght@400;600;700;800;900&family=Playfair+Display:wght@400;600;800&family=Poppins:wght@400;600;800&family=Space+Grotesk:wght@400;600;700&display=swap">
<style>
html, body { height: 100%; overflow: hidden; }
.app { display: flex; flex-direction: column; height: 100vh; }

/* Topbar */
.topbar { height: 58px; flex-shrink: 0; display: flex; align-items: center; gap: 12px; padding: 0 14px; background: var(--bg-1); border-bottom: 1px solid var(--line); }
.topbar .logo { height: 24px; }
.topbar .divider { width: 1px; height: 26px; background: var(--line); }
.proj-name { background: var(--bg-2); border: 1px solid var(--line); border-radius: 9px; padding: 7px 12px; font-weight: 600; font-size: 14px; width: 180px; outline: none; }
.proj-name:focus { border-color: var(--accent); box-shadow: var(--ring); }
.topbar .spacer { flex: 1; }
.tb-btn { width: 38px; height: 38px; border-radius: 9px; border: 1px solid var(--line); background: var(--bg-2); display: flex; align-items: center; justify-content: center; color: var(--text-dim); transition: all .15s; }
.tb-btn:hover { color: var(--text); border-color: var(--line-2); }
.tb-btn.on { color: #fff; background: var(--rm-grad); border-color: transparent; }
.tb-btn svg { width: 18px; height: 18px; }
.tb-btn:disabled { opacity: .35; cursor: default; }
.devseg { display: flex; gap: 2px; background: var(--bg-2); border: 1px solid var(--line); border-radius: 9px; padding: 3px; }
.devseg button { width: 34px; height: 30px; border-radius: 6px; color: var(--text-dim); display: flex; align-items: center; justify-content: center; }
.devseg button.on { background: var(--bg-3); color: var(--text); }
.devseg button svg { width: 16px; height: 16px; }

/* Workspace */
.workspace { flex: 1; display: grid; grid-template-columns: 286px 1fr 326px; grid-template-rows: minmax(0, 1fr); min-height: 0; overflow: hidden; }
.panel { background: var(--bg-1); overflow-y: auto; display: flex; flex-direction: column; min-height: 0; }
.panel.left { border-right: 1px solid var(--line); }
.panel.right { border-left: 1px solid var(--line); }

.tabs { display: flex; position: sticky; top: 0; background: var(--bg-1); z-index: 5; border-bottom: 1px solid var(--line); }
.tab { flex: 1; padding: 14px 8px; text-align: center; font-size: 13px; font-weight: 600; color: var(--text-dim); cursor: pointer; border-bottom: 2px solid transparent; }
.tab.active { color: var(--text); border-bottom-color: var(--accent); }
.tabpane { display: none; } .tabpane.active { display: block; }
.panel-h { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--text-faint); padding: 16px 16px 8px; }

/* Block palette */
.blk-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 8px 14px 18px; }
.blk-item { border: 1px solid var(--line); border-radius: 11px; padding: 16px 8px; text-align: center; cursor: pointer; background: var(--bg-2); transition: all .15s; user-select: none; }
.blk-item:hover { border-color: var(--accent); transform: translateY(-2px); background: var(--bg-3); }
.blk-item .ic { width: 34px; height: 34px; margin: 0 auto 8px; border-radius: 9px; background: var(--rm-grad-soft); color: var(--accent); display: flex; align-items: center; justify-content: center; }
.blk-item .ic svg { width: 18px; height: 18px; }
.blk-item span { font-size: 12.5px; font-weight: 600; }

/* Layers */
.layer { display: flex; align-items: center; gap: 9px; padding: 11px 14px; border-bottom: 1px solid var(--line); cursor: pointer; font-size: 13.5px; }
.layer:hover { background: var(--bg-2); }
.layer.active { background: var(--rm-grad-soft); }
.layer .ic { width: 26px; height: 26px; border-radius: 7px; background: var(--bg-3); color: var(--text-dim); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.layer .ic svg { width: 15px; height: 15px; }
.layer .nm { flex: 1; font-weight: 600; }
.layer .acts { display: flex; gap: 2px; opacity: 0; transition: opacity .15s; }
.layer:hover .acts { opacity: 1; }
.layer .acts button { width: 26px; height: 26px; border-radius: 6px; color: var(--text-faint); display: flex; align-items: center; justify-content: center; }
.layer .acts button:hover { background: var(--bg-3); color: var(--text); }
.layer .acts svg { width: 14px; height: 14px; }

/* Center */
.center { display: flex; flex-direction: column; min-width: 0; min-height: 0; background: var(--bg-3); }
.ai-bar { flex-shrink: 0; display: flex; gap: 10px; align-items: center; padding: 12px 16px; background: var(--bg-1); border-bottom: 1px solid var(--line); }
.ai-bar .spark { width: 32px; height: 32px; border-radius: 9px; background: var(--rm-grad); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.ai-bar .spark svg { width: 17px; height: 17px; color: #fff; }
.ai-bar input { flex: 1; background: var(--bg-2); border: 1px solid var(--line); border-radius: 10px; padding: 11px 14px; outline: none; font-size: 14px; }
.ai-bar input:focus { border-color: var(--accent); box-shadow: var(--ring); }

.canvas-scroll { flex: 1; overflow: auto; padding: 26px; display: flex; justify-content: center; align-items: flex-start; }
.frame { width: 100%; background: var(--bg); border-radius: 14px; overflow: hidden; box-shadow: var(--shadow); transition: max-width .35s cubic-bezier(.2,.8,.2,1); border: 1px solid var(--line); }
.frame.desktop { max-width: 100%; }
.frame.tablet { max-width: 820px; }
.frame.mobile { max-width: 390px; }

/* selection + inline edit (scoped to canvas) */
.frame .rb-block { position: relative; outline: 2px solid transparent; outline-offset: -2px; transition: outline-color .15s; cursor: pointer; }
.frame.preview .rb-block { cursor: default; }
.frame:not(.preview) .rb-block:hover { outline-color: color-mix(in srgb, var(--accent) 45%, transparent); }
.frame:not(.preview) .rb-block.selected { outline-color: var(--accent); }
.blk-toolbar { position: absolute; top: 8px; right: 8px; z-index: 30; display: flex; gap: 3px; background: var(--bg-1); border: 1px solid var(--line-2); border-radius: 9px; padding: 4px; box-shadow: var(--shadow-sm); }
.blk-toolbar button { width: 30px; height: 30px; border-radius: 6px; color: var(--text-dim); display: flex; align-items: center; justify-content: center; }
.blk-toolbar button:hover { background: var(--bg-3); color: var(--text); }
.blk-toolbar button.danger:hover { color: #ff5f57; }
.blk-toolbar svg { width: 15px; height: 15px; }
.frame [contenteditable] { outline: none; }
.frame:not(.preview) [contenteditable]:hover { box-shadow: 0 0 0 1px color-mix(in srgb, var(--accent) 40%, transparent); border-radius: 3px; }
.frame [contenteditable]:focus { box-shadow: 0 0 0 2px var(--accent); border-radius: 3px; background: color-mix(in srgb, var(--accent) 8%, transparent); }

/* Empty state */
.empty { text-align: center; padding: 90px 30px; color: var(--text-dim); }
.empty .big { width: 76px; height: 76px; margin: 0 auto 22px; border-radius: 20px; background: var(--rm-grad); display: flex; align-items: center; justify-content: center; box-shadow: 0 16px 40px -12px rgba(216,81,158,.6); }
.empty .big svg { width: 38px; height: 38px; color: #fff; }
.empty h2 { font-size: 26px; margin-bottom: 10px; }
.empty p { max-width: 42ch; margin: 0 auto 22px; }

/* Inspector */
.insp { padding: 16px; }
.insp-empty { text-align: center; color: var(--text-faint); padding: 50px 20px; font-size: 14px; }
.insp-field { margin-bottom: 15px; }
.insp-field label { display: block; font-size: 12.5px; font-weight: 600; color: var(--text-dim); margin-bottom: 6px; }
.insp-field input[type=text], .insp-field textarea, .insp-field select { width: 100%; background: var(--bg-2); border: 1px solid var(--line); border-radius: 9px; padding: 10px 12px; outline: none; font-size: 13.5px; }
.insp-field input:focus, .insp-field textarea:focus, .insp-field select:focus { border-color: var(--accent); box-shadow: var(--ring); }
.insp-field textarea { min-height: 70px; resize: vertical; font-family: var(--body); }
.color-row { display: flex; align-items: center; gap: 10px; }
.color-row input[type=color] { width: 44px; height: 38px; border: 1px solid var(--line); border-radius: 9px; background: var(--bg-2); padding: 3px; cursor: pointer; }
.color-row .hex { flex: 1; }
.list-item { border: 1px solid var(--line); border-radius: 11px; padding: 12px; margin-bottom: 10px; background: var(--bg-2); }
.list-item .li-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.list-item .li-head b { font-size: 12px; color: var(--text-dim); }
.list-item .li-head button { color: var(--text-faint); font-size: 13px; }
.list-item .li-head button:hover { color: #ff5f57; }
.add-item { width: 100%; padding: 10px; border: 1px dashed var(--line-2); border-radius: 9px; color: var(--text-dim); font-size: 13px; font-weight: 600; }
.add-item:hover { border-color: var(--accent); color: var(--text); }
.seg { display: flex; gap: 4px; background: var(--bg-2); border: 1px solid var(--line); border-radius: 9px; padding: 4px; }
.seg button { flex: 1; padding: 8px; border-radius: 6px; font-size: 13px; font-weight: 600; color: var(--text-dim); }
.seg button.on { background: var(--rm-grad); color: #fff; }
.range-row { display: flex; align-items: center; gap: 10px; }
.range-row input[type=range] { flex: 1; accent-color: var(--accent); }
.range-row .val { font-size: 13px; width: 44px; text-align: right; color: var(--text-dim); }
.swatches { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
.swatch { width: 30px; height: 30px; border-radius: 8px; cursor: pointer; border: 2px solid transparent; }
.swatch:hover { border-color: var(--text); }

/* style separator */
.insp-sep { font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: .05em; color: var(--text-faint); margin: 22px 0 12px; padding-top: 16px; border-top: 1px solid var(--line); }
/* image control */
.img-ctl .img-prev { height: 110px; border-radius: 10px; border: 1px solid var(--line); background-size: cover; background-position: center; margin-bottom: 8px; }
.img-btns { display: flex; gap: 7px; }
.img-btns .mini { padding: 8px 11px; font-size: 12.5px; border-radius: 8px; border: 1px solid var(--line); background: var(--bg-2); color: var(--text-dim); font-weight: 600; cursor: pointer; }
.img-btns .mini:hover { color: var(--text); border-color: var(--accent); }
.img-btns .mini.danger:hover { color: #ff5f57; border-color: #ff5f57; }
/* list-item drag */
.list-item .drag { cursor: grab; color: var(--text-faint); margin-right: 2px; }
.list-item.dragging { opacity: .5; border-color: var(--accent); }
/* layer drag */
.layer .lh { cursor: grab; color: var(--text-faint); font-size: 13px; margin-right: 2px; }
.layer.dragging { opacity: .5; }
.layer.drop-into { box-shadow: inset 0 2px 0 var(--accent); }
/* on-canvas item delete */
.frame .item-del { position: absolute; top: 6px; right: 6px; z-index: 25; width: 22px; height: 22px; border-radius: 50%; background: #ef4444; color: #fff; font-size: 15px; line-height: 1; display: flex; align-items: center; justify-content: center; opacity: 0; transform: scale(.8); transition: .12s; box-shadow: 0 2px 8px rgba(0,0,0,.4); cursor: pointer; }
.frame:not(.preview) .rb-block.selected [data-item]:hover > .item-del { opacity: 1; transform: scale(1); }
.frame .item-del:hover { background: #dc2626; }

/* advanced (badge toggle) */
.adv { margin-top: 16px; border-top: 1px solid var(--line); padding-top: 12px; }
.adv summary { cursor: pointer; font-size: 13px; font-weight: 700; color: var(--text-dim); list-style: none; }
.adv summary::-webkit-details-marker { display: none; }
.adv summary::before { content: '▸ '; }
.adv[open] summary::before { content: '▾ '; }
.adv-toggle { display: flex; gap: 9px; align-items: flex-start; margin-top: 12px; font-size: 13px; color: var(--text); cursor: pointer; }
.adv-toggle input { margin-top: 2px; }
.adv-note { font-size: 12px; color: var(--text-faint); margin-top: 6px; }

/* generation experience */
.frame.just-generated .rb-block { animation: rbReveal .55s both; animation-delay: calc(var(--i,0) * .07s); }
@keyframes rbReveal { from { opacity: 0; transform: translateY(26px); } to { opacity: 1; transform: none; } }
.rm-genie { position: fixed; inset: 0; z-index: 10001; background: rgba(5,5,10,.72); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; padding: 22px; opacity: 0; pointer-events: none; transition: opacity .3s; }
.rm-genie.open { opacity: 1; pointer-events: auto; }
.rm-genie-box { background: var(--bg-1); border: 1px solid var(--line-2); border-radius: 22px; max-width: 540px; width: 100%; box-shadow: var(--shadow); padding: 30px; }
.rm-genie .gh { display: flex; align-items: center; gap: 9px; font-weight: 800; font-size: 14px; color: var(--text-dim); margin-bottom: 14px; }
.rm-genie .gh .sp { width: 30px; height: 30px; border-radius: 9px; background: var(--rm-grad); display: flex; align-items: center; justify-content: center; }
.rm-genie .gh .sp svg { width: 17px; height: 17px; color: #fff; }
.rm-genie h2 { font-size: 24px; font-weight: 900; margin-bottom: 8px; }
.rm-genie .echo { color: var(--text); background: var(--bg-2); border: 1px solid var(--line); border-radius: 10px; padding: 10px 13px; font-size: 14px; margin-bottom: 16px; }
.rm-genie .hintq { color: var(--text-dim); font-size: 13.5px; margin-bottom: 16px; }
.ask-g { margin-bottom: 14px; }
.ask-g label { display: block; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; color: var(--text-faint); margin-bottom: 8px; }
.chiprow { display: flex; flex-wrap: wrap; gap: 7px; }
.gchip { padding: 8px 13px; border-radius: 99px; border: 1px solid var(--line); background: var(--bg-2); color: var(--text-dim); font-size: 13px; font-weight: 600; cursor: pointer; transition: .15s; }
.gchip:hover { color: var(--text); border-color: var(--line-2); }
.gchip.on { background: var(--rm-grad); color: #fff; border-color: transparent; }
.ask-actions { display: flex; gap: 10px; margin-top: 20px; }
.genie-orb { width: 64px; height: 64px; border-radius: 50%; margin: 6px auto 18px; background: conic-gradient(from 0deg, var(--rm-orange), var(--rm-pink), var(--rm-purple), var(--rm-orange)); animation: gspin 1.1s linear infinite; -webkit-mask: radial-gradient(circle 22px at center, transparent 96%, #000 0); mask: radial-gradient(circle 22px at center, transparent 96%, #000 0); }
@keyframes gspin { to { transform: rotate(360deg); } }
.rm-genie [data-step="think"] { text-align: center; }
.rm-genie [data-step="think"] h2 { font-size: 20px; margin-bottom: 18px; }
.think-log { text-align: left; background: var(--bg-2); border: 1px solid var(--line); border-radius: 12px; padding: 14px 16px; height: 172px; overflow: auto; font-size: 13px; font-family: 'JetBrains Mono', monospace; }
.think-log .tl { display: flex; align-items: center; gap: 9px; padding: 4px 0; color: var(--text-dim); animation: rbReveal .3s both; }
.think-log .tl-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--rm-grad); flex-shrink: 0; }
.think-bar { height: 6px; border-radius: 99px; background: var(--bg-3); margin-top: 16px; overflow: hidden; }
.think-bar i { display: block; height: 100%; width: 0; background: var(--rm-grad); border-radius: 99px; transition: width .35s; }

.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--bg-1); border: 1px solid var(--line-2); color: var(--text); padding: 13px 20px; border-radius: 12px; box-shadow: var(--shadow); font-weight: 600; font-size: 14px; opacity: 0; transition: all .25s; z-index: 9500; display: flex; gap: 9px; align-items: center; }
.toast.show { opacity: 1; transform: translateX(-50%); }
.toast .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--rm-grad); }

@media(max-width:1000px){ .workspace { grid-template-columns: 0 1fr 0; } .panel { display: none; } }
</style>
</head>
<body>
<div class="app">
  <!-- TOPBAR -->
  <div class="topbar">
    <a href="index.html" title="Til forsiden"><img class="logo" src="assets/img/reachmore-logo.png" alt="Reachmore"></a>
    <span class="divider"></span>
    <input class="proj-name" id="projName" value="Mit website" spellcheck="false">
    <span class="spacer"></span>

    <div class="devseg" id="devSeg">
      <button data-dev="desktop" class="on" title="Desktop"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="12" rx="2"/><path d="M8 20h8M12 16v4"/></svg></button>
      <button data-dev="tablet" title="Tablet"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="3" width="14" height="18" rx="2"/><path d="M11 18h2"/></svg></button>
      <button data-dev="mobile" title="Mobil"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="7" y="3" width="10" height="18" rx="2"/><path d="M11 18h2"/></svg></button>
    </div>
    <span class="divider"></span>
    <button class="tb-btn" id="undoBtn" title="Fortryd"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 14L4 9l5-5"/><path d="M4 9h11a5 5 0 015 5v0a5 5 0 01-5 5H9"/></svg></button>
    <button class="tb-btn" id="redoBtn" title="Gentag"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 14l5-5-5-5"/><path d="M20 9H9a5 5 0 00-5 5v0a5 5 0 005 5h6"/></svg></button>
    <button class="tb-btn" id="themeBtn" title="Skift editor-tema"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M5 5l1.5 1.5M17.5 17.5L19 19M19 5l-1.5 1.5M6.5 17.5L5 19"/></svg></button>
    <button class="tb-btn" id="previewBtn" title="Forhåndsvisning"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg></button>
    <span class="divider"></span>
    <div id="tokenMeter" title="Dine AI-tokens"></div>
    <button class="btn btn-ghost btn-sm" id="exportBtn">⬇ Eksportér</button>
    <button class="btn btn-primary btn-sm" id="publishBtn">Udgiv ↗</button>
    <span class="divider"></span>
    <div id="acct"></div>
  </div>

  <!-- WORKSPACE -->
  <div class="workspace">
    <!-- LEFT -->
    <aside class="panel left">
      <div class="tabs">
        <div class="tab active" data-tab="add">＋ Tilføj</div>
        <div class="tab" data-tab="layers">≣ Lag</div>
      </div>
      <div class="tabpane active" data-pane="add">
        <div class="panel-h">Sektioner</div>
        <div class="blk-grid" id="blkGrid"></div>
      </div>
      <div class="tabpane" data-pane="layers">
        <div class="panel-h">Sidens lag</div>
        <div id="layerList"></div>
      </div>
    </aside>

    <!-- CENTER -->
    <main class="center">
      <div class="ai-bar">
        <div class="spark"><svg viewBox="0 0 24 24" fill="none"><path d="M12 2l1.6 5.2L19 9l-5.4 1.8L12 16l-1.6-5.2L5 9l5.4-1.8L12 2z" fill="currentColor"/></svg></div>
        <input id="aiInput" placeholder="Beskriv et website eller en sektion — fx 'en café med menu og booking'…">
        <button class="btn btn-primary btn-sm" id="aiGen">Generér ✨</button>
      </div>
      <div class="canvas-scroll">
        <div class="frame desktop" id="frame"></div>
      </div>
    </main>

    <!-- RIGHT -->
    <aside class="panel right">
      <div class="tabs">
        <div class="tab active" data-tab="design">⚙ Egenskaber</div>
        <div class="tab" data-tab="theme">🎨 Tema</div>
      </div>
      <div class="tabpane active" data-pane="design"><div class="insp" id="inspector"></div></div>
      <div class="tabpane" data-pane="theme"><div class="insp" id="themePane"></div></div>
    </aside>
  </div>
</div>

<div class="toast" id="toast"><span class="dot"></span><span id="toastMsg"></span></div>

<script src="assets/js/blocks.js?v=11"></script>
<script src="assets/js/store.js?v=11"></script>
<script src="assets/js/tokens.js?v=11"></script>
<script src="assets/js/auth.js?v=11"></script>
<script src="assets/js/bot.js?v=11"></script>
<script src="assets/js/studio.js?v=11"></script>
</body>
</html>
